<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polo Confecção</title>
    <!--
      Diferente do HTML original, aqui não carregamos script.js diretamente.
      O Vite injeta automaticamente o bundle gerado (main.tsx compilado).
      As fontes do Google continuam sendo carregadas normalmente no <head>.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      #root é o "ponto de montagem" do React.
      O React vai injetar toda a aplicação dentro desta div.
      Fora dela, nada é controlado pelo React.
    -->
    <div id="root"></div>

    <!--
      O Vite substitui este script pelo bundle correto em dev/produção.
      type="module" permite usar import/export nativos do ES Modules.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
